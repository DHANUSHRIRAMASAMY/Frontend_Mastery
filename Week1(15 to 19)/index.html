<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Elan Restaurant</title>

    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <h1>Foodies Spot</h1>
        <p>Delicious Food, Peaceful Ambience</p>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section id="home">
        <h2>Welcome to Foodie's Spot</h2>
        <p>Experience the taste of authentic cuisine.</p>

        <img src="https://assets-news.housing.com/news/wp-content/uploads/2022/11/25120640/image2-49.jpg"
             alt="Restaurant Image"
             width="680"
             height="430">
    </section>

    <section id="book-table">
    <h2>Book a Table</h2>

    <form>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" placeholder="Enter your name" required>

        <br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" placeholder="Enter your email" required>

        <br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" placeholder="Enter your phone number" required>

        <br><br>

        <label for="date">Reservation Date:</label><br>
        <input type="date" id="date" required>

        <br><br>

        <label for="time">Reservation Time:</label><br>
        <input type="time" id="time" required>

        <br><br>

        <label for="guests">Number of Guests:</label><br>
        <select id="guests">
            <option>1 Person</option>
            <option>2 People</option>
            <option>3 People</option>
            <option>4 People</option>
            <option>5+ People</option>
        </select>

        <br><br>

        <label for="request">Special Request:</label><br>
        <textarea id="request" rows="4" cols="30"
        placeholder="Birthday celebration, window seat, etc."></textarea>

        <br><br>

        <button type="submit">Reserve Table</button>
    </form>
</section>

</body>
</html>
