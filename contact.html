<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="contact.css">
    <title>Contact Us - Elan Restaurant</title>
</head>
<body>

    <header>
        <h1>Foodies Spot</h1>
        <p>Delicious Food, Peaceful Ambience</p>
    </header>
    <section id="contact">
        <h2>Contact Us</h2>
        <div class="contact-container">
            <div class="contact-info">
                <h3>📍 Visit Us</h3>
                <p>123 Anna Nagar, Chennai, Tamil Nadu</p>

                <h3>📞 Phone</h3>
                <p>+91 98765 43210</p>

                <h3>✉️ Email</h3>
                <p>foodiesspot@gmail.com</p>

                <h3>🕒 Opening Hours</h3>
                <p>Monday - Sunday</p>
                <p>10:00 AM - 11:00 PM</p>
            </div>
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message"></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
